<?xml version="1.0" encoding="UTF-8"?>
  <svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
    
    <rect width="1920" height="1080" fill="#07090a"/>
    <text x="110" y="90" font-family="Menlo, Monaco, monospace" font-size="24" fill="#92ff5b">WHY GLASSES / HOW IT'S BUILT</text>
    
    <rect x="90" y="180" width="540" height="320" rx="26" ry="26" fill="#0d1210" fill-opacity="0.94"/>
    <text x="118" y="226" font-family="'Avenir Next', Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#f4f7f1">Why this interface</text>
    
          <rect x="110" y="270" width="500" height="52" rx="26" ry="26" fill="#151c18" fill-opacity="1"/>
          <text x="130" y="305" font-family="'Avenir Next', Helvetica, Arial, sans-serif" font-size="24" font-weight="500" fill="#eef6f2">A phone kills the conversation.</text>
        
          <rect x="110" y="340" width="500" height="52" rx="26" ry="26" fill="#151c18" fill-opacity="1"/>
          <text x="130" y="375" font-family="'Avenir Next', Helvetica, Arial, sans-serif" font-size="24" font-weight="500" fill="#eef6f2">Audio would talk over it.</text>
        
          <rect x="110" y="410" width="500" height="52" rx="26" ry="26" fill="#151c18" fill-opacity="1"/>
          <text x="130" y="445" font-family="'Avenir Next', Helvetica, Arial, sans-serif" font-size="24" font-weight="500" fill="#eef6f2">A silent HUD fits inside the turn.</text>
        
  
    
    <rect x="690" y="180" width="540" height="320" rx="26" ry="26" fill="#0d1210" fill-opacity="0.94"/>
    <text x="718" y="226" font-family="'Avenir Next', Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#f4f7f1">Codex + models</text>
    
          <rect x="710" y="270" width="500" height="52" rx="26" ry="26" fill="#151c18" fill-opacity="1"/>
          <text x="730" y="305" font-family="'Avenir Next', Helvetica, Arial, sans-serif" font-size="24" font-weight="500" fill="#eef6f2">Codex wrote the app.</text>
        
          <rect x="710" y="340" width="500" height="52" rx="26" ry="26" fill="#151c18" fill-opacity="1"/>
          <text x="730" y="375" font-family="'Avenir Next', Helvetica, Arial, sans-serif" font-size="24" font-weight="500" fill="#eef6f2">GPT-5.6 writes RECAP.</text>
        
          <rect x="710" y="410" width="500" height="52" rx="26" ry="26" fill="#151c18" fill-opacity="1"/>
          <text x="730" y="445" font-family="'Avenir Next', Helvetica, Arial, sans-serif" font-size="24" font-weight="500" fill="#eef6f2">luna decides help or silence.</text>
        
  
    
    <rect x="1290" y="180" width="540" height="320" rx="26" ry="26" fill="#0d1210" fill-opacity="0.94"/>
    <text x="1318" y="226" font-family="'Avenir Next', Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#f4f7f1">BLE honesty</text>
    
          <rect x="1310" y="270" width="500" height="52" rx="26" ry="26" fill="#151c18" fill-opacity="1"/>
          <text x="1330" y="305" font-family="'Avenir Next', Helvetica, Arial, sans-serif" font-size="24" font-weight="500" fill="#eef6f2">Text first.</text>
        
          <rect x="1310" y="340" width="500" height="52" rx="26" ry="26" fill="#151c18" fill-opacity="1"/>
          <text x="1330" y="375" font-family="'Avenir Next', Helvetica, Arial, sans-serif" font-size="24" font-weight="500" fill="#eef6f2">One image.</text>
        
          <rect x="1310" y="410" width="500" height="52" rx="26" ry="26" fill="#151c18" fill-opacity="1"/>
          <text x="1330" y="445" font-family="'Avenir Next', Helvetica, Arial, sans-serif" font-size="24" font-weight="500" fill="#eef6f2">Nothing wasted.</text>
        
  
    <rect x="90" y="560" width="930" height="250" rx="26" ry="26" fill="#0d1210" fill-opacity="0.94"/>
    <text x="126" y="674" font-family="'Avenir Next', Helvetica, Arial, sans-serif" font-size="30" font-weight="500" fill="#e5fbe9">Mic  →  ASR  →  Window  →  Judge  →  Hint/Word  →  Recap  →  HUD</text>
    <rect x="1080" y="560" width="750" height="250" rx="26" ry="26" fill="#0d1210" fill-opacity="0.94"/>
